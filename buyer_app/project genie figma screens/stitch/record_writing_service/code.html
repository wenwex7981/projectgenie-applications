<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Genie - New Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4169e1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-[#0e111a] font-display">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 flex items-center bg-white/80 backdrop-blur-md dark:bg-background-dark/80 px-4 py-4 border-b border-primary/10">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">New Order</h1>
</div>
<div class="ml-auto">
<button class="text-primary font-medium text-sm">Help</button>
</div>
</header>
<main class="max-w-xl mx-auto p-4 pb-32">
<!-- Package Selection -->
<section class="mb-8">
<h2 class="text-lg font-bold mb-4">Select Package</h2>
<div class="grid grid-cols-1 gap-3">
<label class="relative flex items-center p-4 rounded-xl border-2 border-primary/10 bg-white cursor-pointer hover:border-primary/30 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input checked="" class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="font-bold text-base">Single Entry</p>
<p class="text-sm text-gray-500">Perfect for quick single record updates</p>
</div>
<div class="text-primary opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined">check_circle</span>
</div>
</label>
<label class="relative flex items-center p-4 rounded-xl border-2 border-primary/10 bg-white cursor-pointer hover:border-primary/30 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="font-bold text-base">Bulk Upload</p>
<p class="text-sm text-gray-500">Optimized for high-volume datasets</p>
</div>
<div class="text-primary opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined">check_circle</span>
</div>
</label>
<label class="relative flex items-center p-4 rounded-xl border-2 border-primary/10 bg-white cursor-pointer hover:border-primary/30 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="font-bold text-base">Custom Project</p>
<p class="text-sm text-gray-500">Tailored solutions for complex needs</p>
</div>
<div class="text-primary opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined">check_circle</span>
</div>
</label>
</div>
</section>
<!-- File Upload Section -->
<section class="mb-8">
<div class="flex items-center justify-between mb-4">
<h2 class="text-lg font-bold">Upload Files</h2>
<span class="text-xs font-medium text-gray-400">Max 20MB</span>
</div>
<div class="flex flex-col items-center gap-4 rounded-xl border-2 border-dashed border-primary/20 bg-primary/5 px-6 py-10 transition-colors hover:bg-primary/10">
<div class="flex size-14 items-center justify-center rounded-full bg-primary/20 text-primary">
<span class="material-symbols-outlined text-3xl">upload_file</span>
</div>
<div class="text-center">
<p class="text-[#0e111a] font-bold">Click to upload or drag and drop</p>
<p class="text-gray-500 text-sm mt-1">Supported: PDF, DOCX, JPG</p>
</div>
<button class="mt-2 flex min-w-[120px] items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold shadow-lg shadow-primary/20">
                    Choose Files
                </button>
</div>
</section>
<!-- Quantity and Date -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-gray-700 ml-1">Total Records</label>
<div class="flex items-center bg-white border border-primary/10 rounded-lg p-1 h-12">
<button class="flex size-10 items-center justify-center text-primary hover:bg-primary/5 rounded-md">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="flex-1 text-center border-none focus:ring-0 font-bold bg-transparent" min="1" type="number" value="1"/>
<button class="flex size-10 items-center justify-center text-primary hover:bg-primary/5 rounded-md">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-gray-700 ml-1">Requested Delivery Date</label>
<div class="relative flex items-center bg-white border border-primary/10 rounded-lg h-12 px-4 focus-within:ring-2 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-primary mr-3">calendar_month</span>
<input class="flex-1 border-none focus:ring-0 bg-transparent text-sm font-medium" placeholder="Select Date" readonly="" type="text"/>
</div>
</div>
</section>
<!-- Order Summary Card -->
<div class="bg-primary/5 border border-primary/20 rounded-xl p-5 mb-8">
<div class="flex justify-between items-center mb-2">
<span class="text-sm text-gray-600 font-medium">Service Fee</span>
<span class="font-bold">$45.00</span>
</div>
<div class="flex justify-between items-center mb-4">
<span class="text-sm text-gray-600 font-medium">Processing</span>
<span class="font-bold">$5.00</span>
</div>
<div class="h-px bg-primary/10 w-full mb-4"></div>
<div class="flex justify-between items-center">
<span class="text-base font-bold">Total Estimate</span>
<span class="text-2xl font-black text-primary">$50.00</span>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-lg border-t border-primary/10">
<div class="max-w-xl mx-auto">
<button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-xl shadow-primary/30 transition-transform active:scale-[0.98] flex items-center justify-center gap-2">
<span>Place Order</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
