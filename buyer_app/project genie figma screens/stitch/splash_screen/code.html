<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Genie - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4169e1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .premium-gradient {
            background: linear-gradient(135deg, #4169e1 0%, #2e4482 50%, #121520 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Splash Screen Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden premium-gradient">
<!-- Subtle Ambient Glow Background Patterns -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/30 blur-[120px]"></div>
<!-- Main Branding Content -->
<div class="relative z-10 flex flex-col items-center gap-8 @container">
<!-- Logo Container with Glassmorphism -->
<div class="flex flex-col items-center justify-center group">
<div class="relative mb-6">
<!-- Glow effect behind logo -->
<div class="absolute inset-0 bg-white/20 blur-2xl rounded-full scale-110"></div>
<!-- Main Logo Element -->
<div class="relative flex h-40 w-40 items-center justify-center rounded-xl bg-white/10 glass-effect shadow-2xl overflow-hidden">
<!-- Abstract "Genie" Graphic / Icon -->
<div class="bg-center bg-no-repeat aspect-square bg-cover w-full h-full opacity-90 mix-blend-lighten" data-alt="Abstract geometric futuristic blue and purple logo icon" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBvg286F4qQgDZQh6BzpKcks2iRfcOMNYT5We5BP4QmYm71AfS6tQDScExI8InQCxYBqaYoQCl-SavplIJauwpKLyz4ZRJ6c99dR-xKvnSVHNiErfmOobWOdpa_bZT5o4mGPXCPgz80zwoAj6En8rehc4gjdGaU-WY1Zx_UykNyDVv436gqbgulOQHafKNwKA7MFAdM7US1-mYIyl_5I15511YXTSN8hVE_wJXnLtqoLbEj2wStEZKkdVbzlnSyeVW7STOmLIPwhUI");'>
</div>
<!-- Material Icon Overlay for Brand Identity -->
<div class="absolute flex items-center justify-center">
<span class="material-symbols-outlined text-white text-7xl font-light">auto_awesome</span>
</div>
</div>
</div>
<!-- Textual Branding -->
<div class="flex flex-col items-center space-y-2">
<h1 class="text-white text-4xl font-bold tracking-tight text-center drop-shadow-sm">
                        Project Genie
                    </h1>
<p class="text-white/70 text-lg font-medium tracking-widest uppercase text-center max-w-[320px]">
                        Your Academic Success Partner
                    </p>
</div>
</div>
</div>
<!-- Progress Indicator / Initialization -->
<div class="absolute bottom-16 w-full max-w-xs px-8">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<p class="text-white/60 text-xs font-medium uppercase tracking-[0.2em]">Initializing Systems</p>
<p class="text-white text-xs font-mono">82%</p>
</div>
<div class="h-1 w-full rounded-full bg-white/10 overflow-hidden">
<div class="h-full bg-white/80 rounded-full" style="width: 82%;"></div>
</div>
</div>
</div>
<!-- Footer / Version Branding -->
<div class="absolute bottom-6 w-full flex flex-col items-center gap-1">
<p class="text-white/40 text-[10px] font-semibold tracking-widest uppercase">
                Enterprise Edition
            </p>
<p class="text-white/30 text-[9px] font-medium">
                © 2024 Project Genie Intelligence Systems
            </p>
</div>
</div>
</body></html>
