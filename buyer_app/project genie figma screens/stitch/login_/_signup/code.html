<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Genie - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4169e1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation Placeholder (Hidden on small screens if needed) -->
<div class="flex items-center bg-transparent p-6 justify-between w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<div class="bg-primary p-2 rounded-lg text-white flex items-center justify-center">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<h2 class="text-[#0e111a] dark:text-white text-xl font-bold leading-tight tracking-tight">Project Genie</h2>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-4 @container">
<div class="w-full max-w-[440px]">
<!-- Central Auth Card -->
<div class="bg-white dark:bg-[#1c2130] rounded-xl shadow-sm border border-primary/10 p-8 md:p-10">
<!-- Header Section -->
<div class="text-center mb-8">
<h1 class="text-[#0e111a] dark:text-white text-2xl font-bold tracking-tight mb-2">Welcome back</h1>
<p class="text-[#516294] dark:text-[#a0acc0] text-sm">Enter your details to access your Project Genie account</p>
</div>
<!-- Email Form -->
<form class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#516294] text-[20px]">mail</span>
<input class="form-input flex w-full rounded-lg text-[#0e111a] border border-[#d1d6e6] dark:border-[#333c57] bg-white dark:bg-[#121520] focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 pl-12 pr-4 placeholder:text-[#516294] text-sm font-normal" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#516294] text-[20px]">lock</span>
<input class="form-input flex w-full rounded-lg text-[#0e111a] border border-[#d1d6e6] dark:border-[#333c57] bg-white dark:bg-[#121520] focus:ring-2 focus:ring-primary/20 focus:border-primary h-12 pl-12 pr-4 placeholder:text-•••••••• text-sm font-normal" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-colors shadow-md shadow-primary/20" type="submit">
                        Login
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-[#d1d6e6] dark:border-[#333c57]"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-[#1c2130] px-3 text-[#516294] font-medium tracking-wider">Or continue with</span>
</div>
</div>
<!-- Secondary Auth Options -->
<div class="grid grid-cols-1 gap-4">
<!-- Google Button -->
<button class="flex items-center justify-center gap-3 w-full bg-white dark:bg-transparent border border-[#d1d6e6] dark:border-[#333c57] hover:bg-gray-50 dark:hover:bg-[#252b3d] text-[#0e111a] dark:text-white font-semibold py-3 rounded-lg transition-colors">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google logo icon for social login" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6sFXsb-1DdeHEA_G_h0PSN7Xjpb5OSzd2_cnSO8BPWJXoCdPWofKIjihwLnBXW2WS94gvmG1plHebbsC300sdAY8E9cho2ShL8wkAJdubNRYr4RlI_tTWP2Wvv8LXqg_Ix0ypLIRR8cp-neX_CydeS3HD0poAEZgPfx0dhM9aZSzfzFxOk4IfuTewNtaBINzgeXFoq0EoLYV69XqfvKKADXuXZUTohlC1OLFPOVxFKUOpYAyqNZ33nG4ka9GjkpyRqrhD5-LcuXU"/>
                        Continue with Google
                    </button>
<!-- OTP Button -->
<button class="flex items-center justify-center gap-3 w-full bg-white dark:bg-transparent border border-[#d1d6e6] dark:border-[#333c57] hover:bg-gray-50 dark:hover:bg-[#252b3d] text-[#0e111a] dark:text-white font-semibold py-3 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[20px] text-primary">smartphone</span>
                        Login via Mobile OTP
                    </button>
</div>
<!-- Bottom Link -->
<div class="mt-8 text-center">
<p class="text-[#516294] dark:text-[#a0acc0] text-sm font-medium">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 flex justify-center gap-6 text-[#516294] dark:text-[#a0acc0] text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-primary/5 blur-[100px] rounded-full"></div>
</body></html>
