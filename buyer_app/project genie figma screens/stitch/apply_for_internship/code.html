<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Internship Application - Project Genie</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4169e1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#0e111a] font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-primary/10">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-[#0e111a] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Internship Application</h2>
</div>
<!-- Header Content -->
<div class="px-4 pt-6 pb-4">
<h3 class="text-[#0e111a] dark:text-white tracking-tight text-3xl font-bold leading-tight text-left pb-2">Join the Genie team</h3>
<p class="text-[#516294] dark:text-gray-400 text-base font-normal leading-normal">Fill out the details below to apply for your internship and start your journey with us.</p>
</div>
<!-- Form Container -->
<div class="flex flex-col gap-5 px-4 pb-24">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold leading-normal ml-1">Full Name</label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-[#0e111a] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-gray-800 h-14 placeholder:text-[#516294] px-4 text-base font-normal leading-normal transition-all" placeholder="John Doe" type="text" value=""/>
</div>
</div>
<!-- University -->
<div class="flex flex-col gap-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold leading-normal ml-1">University</label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-[#0e111a] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-gray-800 h-14 placeholder:text-[#516294] px-4 text-base font-normal leading-normal transition-all" placeholder="Stanford University" type="text" value=""/>
</div>
</div>
<!-- Graduation Year & Skills -->
<div class="grid grid-cols-1 gap-5">
<div class="flex flex-col gap-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold leading-normal ml-1">Graduation Year</label>
<select class="form-select flex w-full rounded-xl text-[#0e111a] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-gray-800 h-14 px-4 text-base font-normal leading-normal appearance-none transition-all">
<option disabled="" selected="" value="">Select Year</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>
<option>2027</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold leading-normal ml-1">Skills</label>
<div class="flex flex-wrap gap-2 mb-2">
<span class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 text-primary text-sm font-medium">
                            Python <span class="material-symbols-outlined text-sm ml-1 cursor-pointer">close</span>
</span>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 text-primary text-sm font-medium">
                            UI Design <span class="material-symbols-outlined text-sm ml-1 cursor-pointer">close</span>
</span>
</div>
<input class="form-input flex w-full rounded-xl text-[#0e111a] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-gray-800 h-14 placeholder:text-[#516294] px-4 text-base font-normal leading-normal transition-all" placeholder="Add a skill (e.g. Research)" type="text" value=""/>
</div>
</div>
<!-- Resume Upload -->
<div class="flex flex-col gap-2 mt-2">
<label class="text-[#0e111a] dark:text-white text-sm font-semibold leading-normal ml-1">Resume / CV</label>
<div class="relative group border-2 border-dashed border-primary/30 rounded-xl p-8 flex flex-col items-center justify-center bg-white dark:bg-gray-800 hover:bg-primary/5 transition-colors cursor-pointer">
<div class="size-14 rounded-full bg-primary/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary text-3xl">cloud_upload</span>
</div>
<p class="text-[#0e111a] dark:text-white font-semibold text-base">Tap to upload</p>
<p class="text-[#516294] dark:text-gray-400 text-sm mt-1">PDF or DOCX (Max 5MB)</p>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Mockup of uploaded file state -->
<div class="flex items-center justify-between p-3 bg-primary/5 rounded-lg border border-primary/10 mt-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">description</span>
<div class="flex flex-col">
<span class="text-xs font-bold text-[#0e111a] dark:text-white">my_resume_2024.pdf</span>
<span class="text-[10px] text-[#516294]">1.2 MB • Ready to upload</span>
</div>
</div>
<span class="material-symbols-outlined text-red-500 cursor-pointer text-xl">delete</span>
</div>
</div>
</div>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light dark:bg-background-dark/95 backdrop-blur-sm border-t border-primary/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-95 flex items-center justify-center gap-2">
<span>Submit Application</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
<!-- Background Image Decorative -->
<div class="absolute -top-10 -right-10 size-40 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-20 size-60 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
