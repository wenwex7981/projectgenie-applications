<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Genie - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4169e1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 antialiased">
<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header / Back Navigation -->
<div class="flex items-center p-4 justify-between">
<button class="text-slate-700 dark:text-slate-300 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<div class="flex-1"></div>
</div>
<!-- Hero Content Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="@container w-full max-w-md mx-auto">
<div class="@[480px]:px-4 @[480px]:py-3">
<!-- Professional Career Growth Illustration -->
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-white/50 dark:bg-slate-800/50 rounded-xl min-h-[320px] shadow-sm relative" data-alt="Young professional team celebrating career success and growth" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB3qujtRowmy9xfvQ6wMit2k79EuglZ0xzAPdocbHo9fJVuIFivIcSAnRPl2doIK6zpXEhHtSNbmoXjr1UIgUYEnt_a5oqEr8x7WKeS8NxDUKoGdh3cLodhRjtQPsk3kRtRwNC7xF8HYF1AU4N9mJ568aGw2cyxL0VTnc_nHP18WkjMbJES85zqgPkt8n4hew4DmTuAyFVQqIWzgHV2rjJ-IjMM9wrULHxrAUr4WoMcHiMkekNTAJFWP5QhKlt_jv0o1at5wSMOgXw");'>
<!-- Overlay gradient for depth -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent pointer-events-none"></div>
<!-- Floating Badge Asset (Simulated) -->
<div class="absolute top-4 right-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur p-3 rounded-lg shadow-lg flex items-center gap-3">
<div class="size-8 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">verified</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Career Ready</span>
<span class="text-xs font-semibold text-slate-800 dark:text-slate-100">Profile 100%</span>
</div>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="mt-8 text-center max-w-sm mx-auto">
<h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight px-4">
                    Internships, Resume &amp; Career Support
                </h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed mt-4 px-4">
                    Everything you need to jumpstart your career, from resume writing to internship opportunities.
                </p>
</div>
</div>
<!-- Bottom Controls -->
<div class="flex flex-col w-full items-center justify-end px-6 pb-10 gap-8">
<!-- Progress Indicators (3 of 3) -->
<div class="flex flex-row items-center justify-center gap-3">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<!-- Active dot with width expansion -->
<div class="h-2 w-6 rounded-full bg-primary"></div>
</div>
<!-- Action Button -->
<button class="w-full max-w-md bg-primary text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>Get Started</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<!-- Safe Area Spacer -->
<div class="h-2"></div>
</div>
</div>
</body></html>
